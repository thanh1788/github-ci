version: '3.8'

services:
  webapp:
    image: thanhvippro/myaspnetapp:latest
    container_name: my-web-app
    ports:
      - "8080:8080"
    restart: always

  watchtower:
    image: containrrr/watchtower:1.4.0
    container_name: watchtower_democicd
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 30 
    restart: always